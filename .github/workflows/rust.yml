name: 'rust'
on:
  push:
    branches:
      - master
    paths:
      - 'gui/backend/**'
      - 'rust-toolchain.toml'
  pull_request:
    paths:
      - 'gui/backend/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/rust.yml'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: '-D warnings'

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        working-directory: gui/backend
        run: cargo fmt --all --check

  clippy:
    name: cargo clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/backend
      - name: cargo clippy
        working-directory: gui/backend
        run: cargo clippy --workspace --all-targets -- -D warnings

  deny:
    name: cargo deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/backend
          shared-key: cargo-deny
      - name: Install cargo-deny
        # Pinning to ^0.18 — older versions choke on RUSTSEC advisories
        # that carry a CVSS v4.0 score (the parser only learned about
        # CVSS 4 in 0.17).
        run: cargo install cargo-deny --locked --version ^0.18
      - name: cargo deny check
        working-directory: gui/backend
        run: cargo deny check

  test:
    name: cargo test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/backend
      - name: cargo test --workspace
        working-directory: gui/backend
        run: cargo test --workspace --all-features

  # proptests:
  #   The dedicated proptests target was scoped in plan §4 but never built —
  #   property-testing currently lives inline inside the relevant module's
  #   tests (see m3u8 / token round-trips). Re-enable this job once a real
  #   `tests/proptests.rs` lands, with the PROPTEST_CASES env-gated matrix
  #   from the original plan.
