name: 'rust'
on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - 'gui/src-tauri/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/rust.yml'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: '-D warnings'

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        working-directory: gui/src-tauri
        run: cargo fmt --all --check

  clippy:
    name: cargo clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev libayatana-appindicator3-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri
      - name: cargo clippy
        working-directory: gui/src-tauri
        run: cargo clippy --workspace --all-targets -- -D warnings

  deny:
    name: cargo deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: gui/src-tauri/Cargo.toml
          arguments: --all-features

  test:
    name: cargo test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps for Tauri
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev libayatana-appindicator3-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri
      - name: cargo test --workspace
        working-directory: gui/src-tauri
        run: cargo test --workspace --all-features

  proptests:
    name: proptests (PR=64, nightly=1024)
    runs-on: ubuntu-latest
    env:
      PROPTEST_CASES: ${{ github.event_name == 'schedule' && '1024' || '64' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev libayatana-appindicator3-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri
      - name: cargo test --test proptests
        working-directory: gui/src-tauri
        run: cargo test --test proptests --release
