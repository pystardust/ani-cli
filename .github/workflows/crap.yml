name: 'crap score'
# CRAP = Change Risk Anti-Patterns. Per-file, ccn² × (1 − cov)² + ccn.
# Self-contained: regenerates Rust + frontend lcov files, runs lizard,
# computes per-file CRAP, then ratchets against `coverage-baseline.json`.
# Gates the merge — current numbers are the ceiling.
#
# Always fires; the `filter` job decides whether downstream steps run
# the real pipeline or no-op. See rust.yml for the design rationale.
on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # See rust.yml's filter for why we avoid `git diff | grep -q`
          # under pipefail (SIGPIPE on early grep exit kills the diff).
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if grep -qE '^(gui/backend/|gui/frontend/|tools/|coverage-baseline\.json$|\.github/workflows/crap\.yml$)' <<<"$changed"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  crap:
    needs: filter
    name: lizard + ratchet
    runs-on: ubuntu-latest
    steps:
      - if: needs.filter.outputs.relevant != 'true'
        run: 'echo "Not required: no backend / frontend / tools changes in this PR"'
      - if: needs.filter.outputs.relevant == 'true'
        uses: actions/checkout@v4

      - if: needs.filter.outputs.relevant == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - if: needs.filter.outputs.relevant == 'true'
        name: Install lizard (cyclomatic complexity)
        run: pip install lizard==1.22.1

      - if: needs.filter.outputs.relevant == 'true'
        uses: dtolnay/rust-toolchain@stable
      - if: needs.filter.outputs.relevant == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/backend
          shared-key: llvm-cov
      - if: needs.filter.outputs.relevant == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - if: needs.filter.outputs.relevant == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - if: needs.filter.outputs.relevant == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: gui/frontend/pnpm-lock.yaml

      - if: needs.filter.outputs.relevant == 'true'
        name: pnpm install (frontend)
        working-directory: gui/frontend
        run: pnpm install --frozen-lockfile

      - if: needs.filter.outputs.relevant == 'true'
        name: Install ani-cli runtime deps
        # `cargo llvm-cov --workspace` exercises `anicli_run_debug`, which
        # spawns ./ani-cli — the script `dep_ch`s fzf, curl, openssl, etc.
        # at startup. Same deps the bash workflow installs.
        run: |
          sudo apt-get update
          sudo apt-get install -y curl openssl bsdmainutils xxd fzf mpv ffmpeg aria2

      - if: needs.filter.outputs.relevant == 'true'
        name: Generate Rust lcov
        working-directory: gui/backend
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - if: needs.filter.outputs.relevant == 'true'
        name: Generate frontend lcov
        working-directory: gui/frontend
        run: pnpm exec vitest run --coverage

      - if: needs.filter.outputs.relevant == 'true'
        name: Compute CRAP
        run: |
          mkdir -p coverage
          # Run lizard once, fan out to two crap-score invocations:
          # the JSON one feeds the ratchet check; the table goes to
          # the build log so failures surface the top-N offenders
          # without needing a second push.
          # Exclude Paraglide's compiled output — it's a generated
          # artifact (one switch arm per message key, regenerated at
          # i18n:compile time) and inflates max/p95 wildly without
          # representing handwritten complexity.
          lizard --xml -x "*paraglide*" gui/backend/src gui/frontend/src > coverage/lizard.xml
          node tools/crap-score.mjs \
              --lcov=gui/backend/lcov.info \
              --lcov=gui/frontend/coverage/lcov.info:gui/frontend \
              --root=. < coverage/lizard.xml
          node tools/crap-score.mjs \
              --lcov=gui/backend/lcov.info \
              --lcov=gui/frontend/coverage/lcov.info:gui/frontend \
              --root=. --json < coverage/lizard.xml > coverage/crap-summary.json
          cat coverage/crap-summary.json

      - if: needs.filter.outputs.relevant == 'true'
        name: Ratchet — fail if max/p95/high_risk regressed
        run: node tools/check-coverage-baseline.mjs
