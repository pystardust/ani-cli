name: 'e2e (tauri-driver + Playwright)'
# Gated to manual dispatch until Playwright lands in M3. The full
# pipeline depends on:
#   - tauri-cli + tauri-driver installed on the runner
#   - patchelf for AppImage bundling
#   - gui/frontend/ having a Playwright config + test:e2e script
#   - hermetic backend fixtures so the tests don't hit real Kitsu
# None of those exist yet on master; auto-running this workflow on
# every gui/frontend/** push would just generate red checks.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-linux:
    name: linux (webkit2gtk)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps for Tauri + e2e
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            pkg-config \
            patchelf \
            xvfb \
            webkit2gtk-driver
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: gui/frontend/pnpm-lock.yaml
      - name: Install tauri-cli + tauri-driver
        run: |
          cargo install tauri-cli --locked
          cargo install tauri-driver --locked
      - name: pnpm install
        working-directory: gui/frontend
        run: pnpm install --frozen-lockfile
      - name: Build Tauri (debug)
        working-directory: gui/src-tauri
        run: cargo tauri build --debug
      - name: Run Playwright e2e under Xvfb
        working-directory: gui/frontend
        run: xvfb-run --auto-servernum pnpm test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-linux
          path: gui/frontend/playwright-report/
          retention-days: 14
