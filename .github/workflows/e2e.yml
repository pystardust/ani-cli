name: 'e2e (tauri-driver + Playwright)'
on:
  # E2E exercises a real Tauri build inside Xvfb. The frontend is the
  # critical input: it must exist on disk for actions/setup-node@v4's pnpm
  # cache step. Trigger this workflow only when gui/frontend/ files change
  # (push) or via PR paths that already include it.
  push:
    branches:
      - master
    paths:
      - 'gui/frontend/**'
  pull_request:
    paths:
      - 'gui/frontend/**'
      - 'gui/src-tauri/src/proxy/**'
      - 'gui/src-tauri/src/commands/**'
      - '.github/workflows/e2e.yml'

permissions:
  contents: read

jobs:
  e2e-linux:
    name: linux (webkit2gtk)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps for Tauri + e2e
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            pkg-config \
            xvfb \
            webkit2gtk-driver
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: gui/frontend/pnpm-lock.yaml
      - name: Install tauri-driver
        run: cargo install tauri-driver --locked
      - name: pnpm install
        working-directory: gui/frontend
        run: pnpm install --frozen-lockfile
      - name: Build Tauri (debug)
        working-directory: gui/src-tauri
        run: cargo tauri build --debug
      - name: Run Playwright e2e under Xvfb
        working-directory: gui/frontend
        run: xvfb-run --auto-servernum pnpm test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-linux
          path: gui/frontend/playwright-report/
          retention-days: 14
