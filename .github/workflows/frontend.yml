name: 'frontend'
on:
  push:
    branches:
      - master
    paths:
      - 'gui/frontend/**'
  pull_request:
    paths:
      - 'gui/frontend/**'
      - '.github/workflows/frontend.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: gui/frontend

jobs:
  lint-typecheck-test:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: gui/frontend/pnpm-lock.yaml

      - name: pnpm install --frozen-lockfile
        run: pnpm install --frozen-lockfile

      # `pnpm run lint` = prettier --check + eslint.
      - name: lint (prettier + eslint)
        run: pnpm run lint

      # `pnpm run check` = svelte-kit sync + svelte-check (which also
      # runs the TypeScript checker against generated SvelteKit types).
      - name: typecheck (svelte-check + svelte-kit sync)
        run: pnpm run check

      - name: vitest run
        run: pnpm run test

      - name: vitest run with coverage
        run: pnpm exec vitest run --coverage

      - name: Ratchet — fail if coverage drops
        working-directory: ${{ github.workspace }}
        run: node tools/check-coverage-baseline.mjs

      - name: Upload lcov for downstream CRAP job
        uses: actions/upload-artifact@v4
        with:
          name: frontend-lcov
          path: gui/frontend/coverage/lcov.info
          retention-days: 7

      - name: production build (vite + adapter-static)
        run: pnpm run build
