name: 'frontend'
on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - 'gui/frontend/**'
      - '.github/workflows/frontend.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: gui/frontend

jobs:
  lint-and-test:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: gui/frontend/pnpm-lock.yaml
      - name: pnpm install --frozen-lockfile
        run: pnpm install --frozen-lockfile

      - name: prettier --check
        run: pnpm exec prettier --check .

      - name: eslint
        run: pnpm exec eslint .

      - name: svelte-check
        run: pnpm exec svelte-check --tsconfig ./tsconfig.json

      - name: tsc --noEmit
        run: pnpm exec tsc --noEmit

      - name: vitest (unit + acceptance)
        run: pnpm exec vitest run

      - name: i18n key parity (every key in en/ exists in pt-BR/, es-419/, ru/)
        run: pnpm i18n:check
