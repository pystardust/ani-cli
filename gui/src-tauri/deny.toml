# cargo-deny configuration. Run with `cargo deny check`.

[graph]
all-features = true
no-default-features = false

[output]
feature-depth = 1

[advisories]
yanked = "deny"
# Unmaintained-advisory acknowledgements. These are not security issues —
# they're "this crate is no longer maintained" notices for crates we
# transitively depend on through tauri 2.x's GTK3-era webkit2gtk stack
# (atk, gdk, gtk, gdkx11, gdkwayland, glib, soup, webkit2gtk-sys, etc.)
# and a handful of widely-used proc-macro deps (proc-macro-error,
# instant). Tracking upstream:
#   - tauri 3.x will move to gtk-rs's modern bindings.
#   - syn v1 lingers via tauri-build's old proc-macro-error dep.
# When any of these go from "unmaintained" to actually-vulnerable,
# remove the corresponding ignore line so CI flags it.
ignore = [
    "RUSTSEC-2024-0370", # proc-macro-error (unmaintained)
    "RUSTSEC-2024-0411", # gtk
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0414", # gdk-pixbuf? (gtk-rs family)
    "RUSTSEC-2024-0415", # gdk-pixbuf-sys? (gtk-rs family)
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0417", # gdk-sys / gtk-sys (gtk-rs family)
    "RUSTSEC-2024-0418", # gtk-sys / gdk-sys (gtk-rs family)
    "RUSTSEC-2024-0419", # gdkx11 / gdkwayland (gtk-rs family)
    "RUSTSEC-2024-0420", # gdkx11-sys / gdkwayland-sys (gtk-rs family)
    "RUSTSEC-2025-0075", # transitive (verify when CI re-runs)
    "RUSTSEC-2025-0080", # transitive
    "RUSTSEC-2025-0081", # transitive
    "RUSTSEC-2025-0100", # transitive
    "RUSTSEC-2025-0098", # unic-ucd-version (rust-unic crates unmaintained)
]

[licenses]
# Our crate is GPL-3.0 (inherited from ani-cli). Everything else we link
# against is permissive — list those here.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
    "GPL-3.0",
    # webpki-roots ships under CDLA-Permissive-2.0 (Community Data License
    # Agreement, permissive). It is a recognized SPDX-id permissive license.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-git = []
