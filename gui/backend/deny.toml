# cargo-deny configuration. Run with `cargo deny check`.

[graph]
all-features = true
no-default-features = false

[output]
feature-depth = 1

[advisories]
yanked = "deny"
# Unmaintained-advisory acknowledgements live here as ignores when CI
# flags "this crate is no longer maintained" notices for transitive
# deps. We don't carry any today — the gtk-rs / webkit2gtk-sys family
# was pruned when the desktop shell stopped depending on those.
# Re-add lines as needed when CI surfaces new advisories.
ignore = []

[licenses]
# Our crate is GPL-3.0 (inherited from ani-cli). Everything else we link
# against is permissive — list those here.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
    "GPL-3.0",
    # webpki-roots ships under CDLA-Permissive-2.0 (Community Data License
    # Agreement, permissive). It is a recognized SPDX-id permissive license.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-git = []
