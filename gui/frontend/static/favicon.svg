<?xml version="1.0" encoding="UTF-8"?>
<!--
  ani-gui mark — a film-print register frame holding an italic display-serif
  ampersand. The frame is the hairline motif; the ampersand is the editorial
  register. Single-color (bone-100), works on any warm-ink background. Sized
  for 32×32 with crisp 1.5px hairlines that scale legibly down to 16×16
  because the silhouette is dominated by the frame, not the glyph.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke-linecap="square" stroke-linejoin="miter">
  <!-- outer hairline frame, 1.5px @ 32 -->
  <rect x="3" y="3" width="26" height="26" stroke="#f4ece1" stroke-width="1.5" fill="none"/>
  <!-- inner registration tick, top-left corner only — the "register mark" tell -->
  <path d="M 7 3 L 7 7 L 3 7" stroke="#f4ece1" stroke-width="1" fill="none"/>
  <!-- italic ampersand, drawn as a path so we don't depend on a font being present -->
  <!-- shape: top loop + lower swooping leg, italic tilt ~10°, bone-100 -->
  <path d="
    M 19.0 22.4
    C 16.6 24.4, 13.0 24.4, 11.6 22.4
    C 10.2 20.4, 11.4 18.6, 13.6 17.0
    C 15.8 15.4, 17.6 14.0, 17.6 12.0
    C 17.6 10.0, 16.0 8.6, 14.4 8.6
    C 12.8 8.6, 11.6 9.8, 11.8 11.4
    C 12.0 13.4, 14.2 15.0, 17.0 17.6
    C 19.4 19.8, 21.6 21.6, 23.0 22.4
  " stroke="#f4ece1" stroke-width="1.6" fill="none"/>
</svg>
